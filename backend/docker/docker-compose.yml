version: '3.8'

services:
  teorecord-backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: teorecord-backend
    ports:
      - "5000:5000"

    volumes:
      # 挂载整个backend目录，保持目录结构对齐
      - ..:/app
      
    working_dir: /app

    environment:
      # Flask配置
      - HOST=0.0.0.0
      - PORT=5000
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - DEBUG=${DEBUG:-False}

      # 数据库配置
      - DATABASE_URL=sqlite:///dialect_recorder.db

      # 硅基流动API配置
      - SILICONFLOW_API_KEY=${SILICONFLOW_API_KEY:-}

      # 管理员配置
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-your-admin-password}



    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    networks:
      - teorecord-network

  # 可选：添加数据库服务（如果需要替换SQLite）
  # postgres:
  #   image: postgres:15-alpine
  #   container_name: teorecord-postgres
  #   environment:
  #     POSTGRES_DB: dialect_recorder
  #     POSTGRES_USER: postgres
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   ports:
  #     - "5432:5432"
  #   networks:
  #     - teorecord-network
  #   restart: unless-stopped

networks:
  teorecord-network:
    driver: bridge

volumes:
  postgres_data:  # 如果使用PostgreSQL的话