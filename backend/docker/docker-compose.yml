services:
  teorecord-backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: teorecord-backend
    ports:
      - "5001:5000"

    volumes:
      # 持久化数据目录
      - db_data:/app/instance
      - ./data/logs:/app/logs
      - ./data/data:/app/data
    environment:
      # Flask配置
      - HOST=0.0.0.0
      - PORT=5000
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - DEBUG=${DEBUG:-False}

      # 数据库配置
      - DATABASE_URL=sqlite:////app/instance/dialect_recorder.db

      # 硅基流动API配置
      - SILICONFLOW_API_KEY=${SILICONFLOW_API_KEY:-}

      # 管理员配置
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-your-admin-password}

      # Flask-Limiter 配置
      - RATELIMIT_STORAGE_URL=${RATELIMIT_STORAGE_URL:-redis://redis:6379}
      - RATELIMIT_DEFAULT=${RATELIMIT_DEFAULT:-1000 per day, 100 per hour}

      # Emilia服务配置（可选）
      - EMILIA_SERVICE_URL=${EMILIA_SERVICE_URL:-http://host.docker.internal:5029}

      # Gunicorn配置（生产环境）
      - GUNICORN_WORKERS=${GUNICORN_WORKERS:-2}
      - GUNICORN_THREADS=${GUNICORN_THREADS:-4}
      - GUNICORN_TIMEOUT=${GUNICORN_TIMEOUT:-120}
      - GUNICORN_LOG_LEVEL=${GUNICORN_LOG_LEVEL:-info}

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    networks:
      - teorecord-network
    depends_on:
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Redis服务用于Flask-Limiter存储
  redis:
    image: redis:7-alpine
    container_name: teorecord-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - teorecord-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # Emilia服务（可选）
  # 如果需要在Docker中运行Emilia服务，取消下面的注释
  # emilia:
  #   image: your-emilia-image:latest
  #   container_name: teorecord-emilia
  #   ports:
  #     - "5029:5029"
  #   volumes:
  #     - emilia_data:/app/data
  #   restart: unless-stopped
  #   networks:
  #     - teorecord-network
  #   environment:
  #     - EMILIA_CONFIG=/app/config.json

networks:
  teorecord-network:
    driver: bridge

volumes:
  redis_data:     # Redis数据持久化
  db_data:        # 数据库数据持久化
  emilia_data:    # Emilia服务数据持久化（可选）