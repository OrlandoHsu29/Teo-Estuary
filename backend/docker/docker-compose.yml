services:
  mysql:
    image: mysql:8.0
    container_name: teo-estuary-mysql
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=teo_root_password
      - MYSQL_DATABASE=teo_estuary
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped
    networks:
      - teo-estuary-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pteo_root_password"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 30s
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  teo-estuary-backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: teo-estuary-backend
    ports:
      - "5001:5000"
    volumes:
      - ./instance:/app/instance
      - ./data/logs:/app/logs
      - ./data/data:/app/data
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=root
      - MYSQL_PASSWORD=teo_root_password
      - MYSQL_DATABASE=teo_estuary
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - DEBUG=${DEBUG:-False}
      - SILICONFLOW_API_KEY=${SILICONFLOW_API_KEY:-}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-your-admin-password}
      - ENABLE_RATE_LIMITER=${ENABLE_RATE_LIMITER:-False}
      - RATELIMIT_STORAGE_URL=${RATELIMIT_STORAGE_URL:-redis://redis:6379}
      - RATELIMIT_DEFAULT=${RATELIMIT_DEFAULT:-1000 per day, 100 per hour}
      - EMILIA_SERVICE_URL=${EMILIA_SERVICE_URL:-http://host.docker.internal:5029}
      - ASR_SERVICE_URL=${ASR_SERVICE_URL:-http://host.docker.internal:5026}
      - GUNICORN_WORKERS=${GUNICORN_WORKERS:-2}
      - GUNICORN_THREADS=${GUNICORN_THREADS:-4}
      - GUNICORN_TIMEOUT=${GUNICORN_TIMEOUT:-120}
      - GUNICORN_LOG_LEVEL=${GUNICORN_LOG_LEVEL:-info}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - teo-estuary-network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Redis服务用于Flask-Limiter存储
  redis:
    image: redis:7-alpine
    container_name: teo-estuary-redis
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - teo-estuary-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # Emilia服务（可选）
  # 如果需要在Docker中运行Emilia服务，取消下面的注释
  # emilia:
  #   image: your-emilia-image:latest
  #   container_name: teo-estuary-emilia
  #   ports:
  #     - "5029:5029"
  #   volumes:
  #     - emilia_data:/app/data
  #   restart: unless-stopped
  #   networks:
  #     - teo-estuary-network
  #   environment:
  #     - EMILIA_CONFIG=/app/config.json

networks:
  teo-estuary-network:
    driver: bridge

volumes:
  mysql_data:     # MySQL数据持久化（Docker命名卷）
  redis_data:     # Redis数据持久化（Docker命名卷）
  emilia_data:    # Emilia服务数据持久化（可选）