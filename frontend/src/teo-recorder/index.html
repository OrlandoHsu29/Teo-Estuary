<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teo Recorder - 潮汕话录音机</title>
    <link rel="stylesheet" href="../css/toast.css">
    <link rel="stylesheet" href="../css/key-config.css">
    <link rel="stylesheet" href="../css/dottedfont.css">
    <link rel="stylesheet" href="./css/style.css">

    <script src="../js/config.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;500;700&family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 背景动画元素 -->
    <div class="grid-overlay"></div>
    <div class="pulse-ring"></div>
    <div class="pulse-ring"></div>
    <div class="pulse-ring"></div>
    <div class="pulse-ring"></div>
    <div class="audio-particles" id="audioParticles"></div>

    <div class="container">
        <div class="recorder-metro">
            <!-- 返回按钮 - 设备上方居中 -->
            <button class="back-btn" onclick="goBack()" title="返回主页">
                <svg class="back-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M15 3h6v18h-6M10 17l5-5-5-5M15 12H3"/>
                </svg>
            </button>
            <!-- 录音机外壳 -->
            <div class="recorder-body">
                <!-- 录音机屏幕 -->
                <div class="recorder-screen">
                    <div class="screen-content">
                        <div class="status-indicator">
                            <span class="status-dot" id="statusDot"></span>
                            <span class="status-text" id="statusText">----</span>
                        </div>

                        <div class="text-display" id="textDisplay">
                            
                        </div>

                        <div class="progress-bar">
                            <div class="progress-fill" id="progressFill"></div>
                        </div>

                        <div class="timer" id="timer">00:00</div>
                    </div>
                </div>

                <!-- 录音机控制面板 -->
                <div class="control-panel">
                    <!-- 主控制按钮 -->
                    <div class="main-controls">
                        <button class="control-btn btn-get-text" id="btnGetText" title="获取新句子">
                            <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 4v6h6"></path>
                                <path d="M23 20v-6h-6"></path>
                                <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"></path>
                            </svg>
                        </button>

                        <button class="control-btn btn-record" id="btnRecord" title="开始录音">
                            <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                                <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                                <line x1="12" y1="19" x2="12" y2="23"></line>
                                <line x1="8" y1="23" x2="16" y2="23"></line>
                            </svg>
                        </button>

                        <button class="control-btn btn-stop" id="btnStop" title="停止录音" disabled>
                            <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            </svg>
                        </button>

                        <button class="control-btn btn-play" id="btnPlay" title="播放录音" disabled>
                            <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polygon points="5 3 19 12 5 21 5 3"></polygon>
                            </svg>
                        </button>

                        <button class="control-btn btn-upload" id="btnUpload" title="上传录音" disabled>
                            <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="17 8 12 3 7 8"></polyline>
                                <line x1="12" y1="3" x2="12" y2="15"></line>
                            </svg>
                        </button>
                    </div>

                    <!-- 音量指示器 -->
                    <div class="volume-meter">
                        <div class="volume-bars">
                            <div class="volume-bar" data-level="1"></div>
                            <div class="volume-bar" data-level="2"></div>
                            <div class="volume-bar" data-level="3"></div>
                            <div class="volume-bar" data-level="4"></div>
                            <div class="volume-bar" data-level="5"></div>
                        </div>
                        <div class="volume-label">音量</div>
                    </div>
                </div>

                <!-- 录音机装饰细节 -->
                <div class="recorder-details">
                    <div class="speaker-grille">
                        <div class="grille-lines"></div>
                    </div>
                    <div class="brand-section">
                        <div class="recorder-brand">TEO RECORDER</div>
                        <div class="recorder-model">Olndio-2025</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 设备说明书 -->
        <div class="manual-container" id="manualContainer">
            <div class="manual-controls">
                <!-- 折叠按钮 -->
                <button class="manual-toggle" id="manualToggle" onclick="toggleManual()">
                    <svg class="manual-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14,2 14,8 20,8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                        <polyline points="10,9 9,9 8,9"></polyline>
                    </svg>
                    <span>使用说明</span>
                </button>

                <!-- 密钥配置按钮 -->
                <button class="key-config-btn" id="keyConfigBtn" onclick="KeyManager.goToKeyConfig()" title="配置API密钥">
                    <svg class="key-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <circle cx="8" cy="8" r="5"></circle>
                        <line x1="13" y1="13" x2="20" y2="20"></line>
                        <line x1="15" y1="15" x2="15" y2="18"></line>
                        <line x1="18" y1="18" x2="18" y2="21"></line>
                    </svg>
                </button>
            </div>

            <!-- 说明书内容 -->
            <div class="manual-content" id="manualContent">
                <div class="manual-paper">
                    <div class="manual-header">
                        <div class="manual-title">TEO RECORDER</div>
                        <div class="manual-subtitle">潮汕话录音机快速使用指南</div>
                    </div>

                    <div class="manual-steps">
                        <div class="step-item">
                            <div class="step-number">1</div>
                            <div class="step-text">点击更新按钮，获取新的跟读文本</div>
                        </div>
                        <div class="step-item">
                            <div class="step-number">2</div>
                            <div class="step-text">点击红色录音按钮开始录音</div>
                        </div>
                        <div class="step-item">
                            <div class="step-number">3</div>
                            <div class="step-text">用潮汕话语速适中、口齿清晰地朗读屏幕上显示的文本内容</div>
                        </div>
                        <div class="step-item">
                            <div class="step-number">4</div>
                            <div class="step-text">点击停止按钮结束录音</div>
                        </div>
                        <div class="step-item">
                            <div class="step-number">5</div>
                            <div class="step-text">播放检查录音质量，确认无误后上传</div>
                        </div>
                    </div>

                    <div class="manual-footer">
                        <div class="manual-note">按空格键可快速开始/停止录音</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 底部信息 -->
        <div class="footer-info">
            <div class="footer-divider"></div>
            <div class="footer-line">
                <a href="https://beian.miit.gov.cn" target="_blank" rel="noopener noreferrer" class="icp-link">粤ICP备2025500777号</a>
                <span class="icp-separator">|</span>
                <a href="http://www.beian.gov.cn/portal/registerSystemInfo" target="_blank" rel="noopener noreferrer" class="icp-link">粤公网安备44520202000473号</a>
            </div>
        </div>
    </div>

    <!-- 提示消息 -->
    <div class="toast-universal" id="toastUniversal"></div>

    <script src="./js/recorder.js"></script>

    <script>

        // 调试信息 - API_BASE_URL已在recorder.js中定义
        console.log('页面加载完成，检查API配置...');
        console.log('API_BASE_URL:', typeof API_BASE_URL !== 'undefined' ? API_BASE_URL : '未定义');

        // 说明书折叠功能
        function toggleManual() {
            const content = document.getElementById('manualContent');
            const toggle = document.getElementById('manualToggle');

            if (content.classList.contains('expanded')) {
                content.classList.remove('expanded');
                toggle.querySelector('span').textContent = '使用说明';
            } else {
                content.classList.add('expanded');
                toggle.querySelector('span').textContent = '收起说明';
            }
        }

        // 页面加载时检查密钥配置
        document.addEventListener('DOMContentLoaded', function() {
            // 创建音频粒子效果
            const particlesContainer = document.getElementById('audioParticles');
            const particleCount = 15;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'audio-particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.height = (25 + Math.random() * 35) + 'px';
                // 使用随机延迟，让粒子分布更均匀
                particle.style.animationDelay = (Math.random() * 5) + 's';
                particle.style.animationDuration = (4 + Math.random() * 4) + 's';
                particlesContainer.appendChild(particle);
            }
        });
    </script>
</body>
</html>
